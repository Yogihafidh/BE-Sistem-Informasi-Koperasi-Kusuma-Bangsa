name: CI - Integration Testing

on:
  push:
    branches:
      - development
  pull_request:
    branches:
      - production

jobs:
  integration-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379

      minio:
        image: bitnami/minio:latest
        env:
          MINIO_ROOT_USER: testminio
          MINIO_ROOT_PASSWORD: testminiopass
        ports:
          - 9000:9000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node (with cache)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb

      - name: Apply Prisma migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb

      - name: Wait for MinIO
        run: |
          for i in {1..30}; do
            if (echo > /dev/tcp/localhost/9000) >/dev/null 2>&1; then
              echo "MinIO is ready"
              exit 0
            fi
            sleep 2
          done
          echo "MinIO did not become ready in time"
          exit 1

      - name: Run Integration Test
        run: npm run test:integration
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          REDIS_URL: redis://localhost:6379
          MINIO_ENDPOINT: localhost
          MINIO_PORT: 9000
          MINIO_USE_SSL: 'false'
          MINIO_ACCESS_KEY: testminio
          MINIO_SECRET_KEY: testminiopass
